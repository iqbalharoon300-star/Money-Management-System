<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c896">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h2>💳 Money Manager</h2>
</header>

<!-- HOME -->
<section id="home" class="active">

  <div class="hero">
    <h1 id="totalBalance">AED 0</h1>
    <p id="netWorth">Net: 0</p>
  </div>

  <div id="accountsScroll" class="scroll"></div>

  <div class="card insight" id="insightBox"></div>

  <div class="card">
    <h3>This Month</h3>
    <p id="monthlyStats"></p>
  </div>

  <div class="card">
    <h3>Recent</h3>
    <ul id="recentList"></ul>
  </div>

</section>

<!-- ADD -->
<section id="add">

  <h2>Add Transaction</h2>

  <select id="type" onchange="loadCategories(); toggleTransfer()">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
    <option value="remittance">Remittance</option>
    <option value="transfer">Transfer</option>
  </select>

  <input id="amount" type="number" placeholder="Amount">
  <select id="category"></select>
  <input id="date" type="date">

  <select id="account"></select>
  <select id="toAccount" style="display:none;"></select>

  <button onclick="addTransaction()">Save</button>

</section>

<!-- REPORTS -->
<section id="reports">
  <h2>Analytics</h2>
  <canvas id="monthlyChart"></canvas>
  <canvas id="categoryChart"></canvas>
</section>

<nav>
  <button onclick="navigate('home')">🏠</button>
  <button onclick="navigate('add')">➕</button>
  <button onclick="navigate('reports')">📊</button>
</nav>

<script src="app.js"></script>
</body>
</html>
