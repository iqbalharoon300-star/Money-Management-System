<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Money Manager</title>

<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <div class="logo">💳 Money Manager</div>
  <button onclick="navigate('accounts')">🏦</button>
</header>

<section id="home" class="active">

  <div class="hero-card">
    <div>
      <p>Total Balance</p>
      <h1 id="totalBalance">AED 0</h1>
    </div>
    <div>
      <p id="netWorth">Net: 0</p>
    </div>
  </div>

  <div id="accountsScroll" class="scroll"></div>

  <div class="card insight" id="insightBox"></div>

  <div class="card">
    <h3>This Month</h3>
    <p id="monthlyStats"></p>
  </div>

  <div class="card">
    <h3>Recent</h3>
    <ul id="recentList"></ul>
  </div>

</section>

<section id="add">
  <h2>Add Transaction</h2>

  <select id="type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
    <option value="remittance">Remittance</option>
    <option value="transfer">Transfer</option>
  </select>

  <input type="number" id="amount" placeholder="Amount" />
  <input type="text" id="category" placeholder="Category" />
  <input type="date" id="date" />

  <select id="account"></select>
  <select id="toAccount"></select>

  <button onclick="addTransaction()">Save</button>
</section>

<section id="records">
  <h2>Records</h2>
  <ul id="recordsList"></ul>
</section>

<section id="accounts">
  <h2>Accounts</h2>

  <input id="accName" placeholder="Bank Name">
  <select id="accCurrency">
    <option value="AED">AED</option>
    <option value="PKR">PKR</option>
  </select>
  <input id="accBalance" type="number" placeholder="Opening Balance">
  <button onclick="addAccount()">Add Account</button>

  <div id="accountsList"></div>
</section>

<nav>
  <button onclick="navigate('home')">🏠</button>
  <button onclick="navigate('add')">➕</button>
  <button onclick="navigate('records')">📋</button>
</nav>

<script src="app.js"></script>
</body>
</html>
